name: Burn-In

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: Strategy to run for burn-in
        required: false
        default: momentum
  schedule:
    - cron: "5 12-22 * * 1-5"

permissions:
  contents: read

concurrency:
  group: burnin
  cancel-in-progress: false

jobs:
  burnin:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Determine market checkpoint
        id: schedule
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "slot=manual" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          et_hour="$(TZ=America/New_York date +%H)"
          case "${et_hour}" in
            08)
              slot="pre-market"
              ;;
            11)
              slot="mid-morning"
              ;;
            14)
              slot="mid-afternoon"
              ;;
            17)
              slot="after-hours"
              ;;
            *)
              slot=""
              ;;
          esac

          if [[ -n "${slot}" ]]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "slot=${slot}" >> "${GITHUB_OUTPUT}"
          else
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip non-target hours
        if: steps.schedule.outputs.should_run != 'true'
        run: echo "Skipping this hourly trigger because it is outside the four target US market checkpoints."

      - name: Check out repository
        if: steps.schedule.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.schedule.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Validate burn-in environment secret
        if: steps.schedule.outputs.should_run == 'true'
        env:
          PAPER_BURNIN_ENV: ${{ secrets.PAPER_BURNIN_ENV }}
        shell: bash
        run: |
          if [[ -z "${PAPER_BURNIN_ENV}" ]]; then
            echo "Missing repository secret PAPER_BURNIN_ENV." >&2
            exit 1
          fi

      - name: Create burn-in environment file
        if: steps.schedule.outputs.should_run == 'true'
        env:
          PAPER_BURNIN_ENV: ${{ secrets.PAPER_BURNIN_ENV }}
        shell: bash
        run: printf '%s\n' "${PAPER_BURNIN_ENV}" > .env

      - name: Create virtual environment
        if: steps.schedule.outputs.should_run == 'true'
        run: python -m venv .venv

      - name: Install dependencies
        if: steps.schedule.outputs.should_run == 'true'
        run: .venv/bin/pip install -e .[dev]

      - name: Run burn-in workflow
        if: steps.schedule.outputs.should_run == 'true'
        env:
          STRATEGY: ${{ github.event.inputs.strategy || 'momentum' }}
        run: |
          echo "Running slot=${{ steps.schedule.outputs.slot }} strategy=${STRATEGY}"
          make burnin-day
          make burnin-review

      - name: Upload burn-in logs
        if: always() && steps.schedule.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: burnin-${{ github.run_number }}-${{ steps.schedule.outputs.slot }}
          path: |
            logs/burnin/
          if-no-files-found: warn
